<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALA – Begin Your Process. Custom profile creation.">
    <title>ALA — Begin Your Process | Custom Creation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- No Custom Cursor -->
    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-logo"><a href="index.html">ALA</a></div>
        <div class="nav-links">
            <a href="index.html#product">The Product</a>
            <a href="index.html#craft">Craftsmanship</a>
            <a href="index.html#experience">The Experience</a>
            <a href="index.html#bespoke">Custom Creation</a>
        </div>
        <a href="profile.html" class="btn-primary">Bespoke</a>
    </nav>

    <main class="main-content bg-warm pt-8 pb-4" style="min-height: 100vh; display: flex; align-items: center;">
        <section class="section-pad w-100">
            <div class="container max-w-600 form-container reveal-up" style="transform: translateY(30px); opacity: 0;">
                <p class="eyebrow text-center">Bespoke</p>
                <h1 class="section-title text-center mb-2" style="font-size: clamp(2.5rem, 5vw, 4rem);">Begin Your Process</h1>
                <p class="section-body text-center mx-auto mb-4">Please provide your details to initiate the creation of your custom ALA frame.</p>

                <form class="custom-form mt-4">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label for="address">Shipping Address</label>
                        <textarea id="address" name="address" rows="2" placeholder="Enter your full shipping address" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="preferences">Material & Detail Preferences</label>
                        <textarea id="preferences" name="preferences" rows="2" placeholder="e.g., Sandalwood with Gold Inlay Initials"></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-block mt-2">Submit Request</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Custom Cursor
        const cursor = document.getElementById("cursor");
        const cursorFollower = document.getElementById("cursor-follower");
        if (cursor && cursorFollower && window.innerWidth > 900) {
            document.addEventListener("mousemove", (e) => {
                cursor.style.left = e.clientX + "px";
                cursor.style.top = e.clientY + "px";
                cursorFollower.style.left = e.clientX + "px";
                cursorFollower.style.top = e.clientY + "px";
            });
            document.querySelectorAll("a, button, input, textarea").forEach((el) => {
                el.addEventListener("mouseenter", () => {
                    cursorFollower.style.width = "60px";
                    cursorFollower.style.height = "60px";
                    cursorFollower.style.background = "rgba(184, 146, 74, 0.1)";
                });
                el.addEventListener("mouseleave", () => {
                    cursorFollower.style.width = "36px";
                    cursorFollower.style.height = "36px";
                    cursorFollower.style.background = "transparent";
                });
            });
        }
        
        // Form Animation Reveal
        gsap.to(".form-container", {
            y: 0,
            opacity: 1,
            duration: 1.2,
            ease: "power3.out",
            delay: 0.1
        });
    </script>
</body>

</html>
